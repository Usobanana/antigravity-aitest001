name: "Deploy Godot Project to GitHub Pages"
on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  export_web:
    runs-on: ubuntu-latest
    name: Export Web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.3.0
          use-dotnet: false

      - name: Web Export
        run: |
          # サブディレクトリに移動してエクスポート
          cd "新しいゲームプロジェクト"
          mkdir -v -p ../build/web
          godot --headless --export-release "Web" ../build/web/index.html
          # coi-serviceworker もコピー
          cp coi-serviceworker.js ../build/web/

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: export_web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
